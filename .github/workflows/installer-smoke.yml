name: installer-smoke
# Validates installer/setup-hermes.sh on a clean Ubuntu runner:
# - renders into a target dir
# - permission boundary holds (rails read-only to agent, state writable)
# - hermes entry point runs as the agent user
# - second run is idempotent and fast

on:
  pull_request:
    paths:
      - 'installer/**'
      - 'ops/**'
      - 'deploy.values.yaml'
      - 'pyproject.toml'
      - '.github/workflows/installer-smoke.yml'
  push:
    branches: [main]
    paths:
      - 'installer/**'
      - 'ops/**'
      - 'deploy.values.yaml'
      - 'pyproject.toml'
      - '.github/workflows/installer-smoke.yml'

permissions:
  contents: read

# Cancel in-flight runs on the same ref when a new commit lands; saves CI
# minutes when rapid pushes obsolete previous runs.
concurrency:
  group: installer-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: stage fork at /srv/hermes/repos/hermes-agent
        run: |
          sudo mkdir -p /srv/hermes/repos
          sudo cp -a "$GITHUB_WORKSPACE" /srv/hermes/repos/hermes-agent
          sudo chown -R root:root /srv/hermes

      - name: stage fake state repo at /srv/hermes/repos/hermes-state
        # Real deploys clone the private hermes-state repo from GitHub. CI
        # doesn't have credentials for that, so we fabricate a local fixture
        # with the same shape (skills/memories/cron + jobs.json + .gitignore).
        # The installer should treat this just like the real thing.
        run: |
          sudo mkdir -p /srv/hermes/repos/hermes-state
          sudo git -C /srv/hermes/repos/hermes-state init -q -b main
          sudo install -d \
            /srv/hermes/repos/hermes-state/skills \
            /srv/hermes/repos/hermes-state/memories \
            /srv/hermes/repos/hermes-state/cron \
            /srv/hermes/repos/hermes-state/cron/output
          sudo touch \
            /srv/hermes/repos/hermes-state/skills/.gitkeep \
            /srv/hermes/repos/hermes-state/memories/.gitkeep \
            /srv/hermes/repos/hermes-state/cron/output/.gitkeep
          # Stub every skill referenced by deploy.values.yaml's slack_triggers
          # so values_helper.py's existence check passes without needing the
          # real hermes-state repo. The validator only checks for SKILL.md
          # presence in a directory matching the skill name. Add a new stub
          # here whenever a new slack_triggers entry lands.
          sudo install -d /srv/hermes/repos/hermes-state/skills/feedback-intake
          sudo touch /srv/hermes/repos/hermes-state/skills/feedback-intake/SKILL.md
          echo '{}' | sudo tee /srv/hermes/repos/hermes-state/cron/jobs.json > /dev/null
          sudo git -C /srv/hermes/repos/hermes-state \
            -c user.email=ci@example.com -c user.name=ci add -A
          sudo git -C /srv/hermes/repos/hermes-state \
            -c user.email=ci@example.com -c user.name=ci commit -q -m "init fixture"
          sudo chown -R root:root /srv/hermes/repos/hermes-state

      - name: create hermes service user
        run: sudo useradd -m -s /bin/bash hermes

      - name: stage fixture repos + patch values for repos[]
        # Real deploys point repos[].url at private GitHub repos. CI has
        # no credentials for those, so fabricate five local non-bare repos:
        #   * test-factory-code   — quay-managed (entry has a `quay:` block).
        #   * brix-indexer        — quay-managed, base_branch: dev (private
        #                           pnpm-based repo in the real fork; here a
        #                           local fixture init'd on `dev` directly to
        #                           exercise the second quay-managed entry +
        #                           the pnpm plain-binary runtime-manager path).
        #   * hermes-agent        — quay-managed self-host entry; the fork
        #                           lists itself in repos[] so quay can take
        #                           tickets that touch the installer. Stub
        #                           with a local fixture so the auth-method
        #                           precondition (github.com + quay → App
        #                           creds) doesn't trip on CI.
        #   * code-only-fixture   — code-only, base_branch: main; exercises
        #                           the "code mirror only" branch of the
        #                           repos[] loop.
        #   * non-default-branch-fixture — code-only, base_branch: develop,
        #                           but the repo's HEAD is on `main` so a
        #                           clone resolves origin/HEAD → origin/main.
        #                           Catches the regression where hermes-
        #                           code-sync would derive base from
        #                           origin/HEAD and snap the mirror to
        #                           main on every tick.
        # The installer's `git clone` is protocol-agnostic; file:// URLs
        # bypass the per-repo url.insteadOf rewrite (which is github.com-
        # only) and clone directly.
        run: |
          QUAY_FIXTURE=/srv/hermes/repos/quay-fixtures/test-factory-code
          BRIX_FIXTURE=/srv/hermes/repos/quay-fixtures/brix-indexer
          HERMES_FIXTURE=/srv/hermes/repos/quay-fixtures/hermes-agent
          CODE_FIXTURE=/srv/hermes/repos/code-fixtures/code-only-fixture
          DEV_FIXTURE=/srv/hermes/repos/code-fixtures/non-default-branch-fixture
          git_in() { sudo git -C "$1" -c user.email=ci@example.com -c user.name=ci "${@:2}"; }
          init_fixture() {  # $1=dir  $2=commit_msg  ($3=branch, default main)
            sudo mkdir -p "$1"
            git_in "$1" init -q -b "${3:-main}"
            echo "$2" | sudo tee "$1/README.md" >/dev/null
            git_in "$1" add -A
            git_in "$1" commit -q -m "$2"
          }
          init_fixture "$QUAY_FIXTURE" "init fixture"
          # brix-indexer real repo lives on `dev`; init the fixture there
          # directly so the values entry's base_branch=dev resolves cleanly.
          init_fixture "$BRIX_FIXTURE" "init fixture" dev
          init_fixture "$HERMES_FIXTURE" "init fixture"
          init_fixture "$CODE_FIXTURE" "init fixture"
          # HEAD on main (so origin/HEAD points at main after clone), then
          # add a develop branch with a distinct commit, then return HEAD
          # to main so the values entry's base_branch=develop diverges
          # from the remote default — the regression test for hermes-
          # code-sync resolving base from origin/HEAD.
          init_fixture "$DEV_FIXTURE" "main commit"
          git_in "$DEV_FIXTURE" checkout -q -b develop
          echo "develop commit" | sudo tee "$DEV_FIXTURE/README.md" >/dev/null
          git_in "$DEV_FIXTURE" add -A
          git_in "$DEV_FIXTURE" commit -q -m "develop commit"
          git_in "$DEV_FIXTURE" checkout -q main
          # Repoint both quay-managed entries' URLs at their local fixtures
          # and append the two code-only entries to repos[]. Use python to
          # round-trip through PyYAML so the structure stays valid no matter
          # where `quay:` lives relative to `repos:`.
          # The heredoc body is indented to keep the YAML `run: |` block
          # scalar intact (a column-0 line would terminate it); `sed`
          # strips the indent before Python sees it, so the script reads
          # as column-0 module-level code.
          sed 's/^          //' <<'PY' | sudo python3 - "$QUAY_FIXTURE" "$BRIX_FIXTURE" "$HERMES_FIXTURE" "$CODE_FIXTURE" "$DEV_FIXTURE"
          import sys, yaml
          quay_fixture, brix_fixture, hermes_fixture, code_fixture, dev_fixture = sys.argv[1:6]
          path = "/srv/hermes/repos/hermes-agent/deploy.values.yaml"
          with open(path) as f:
              data = yaml.safe_load(f)
          rewrite = {
              "test-factory-code": quay_fixture,
              "brix-indexer": brix_fixture,
              "hermes-agent": hermes_fixture,
          }
          for entry in data.get("repos", []):
              if entry.get("id") in rewrite:
                  entry["url"] = f"file://{rewrite[entry['id']]}"
          data["repos"].append({
              "id": "code-only-fixture",
              "url": f"file://{code_fixture}",
              "base_branch": "main",
          })
          data["repos"].append({
              "id": "non-default-branch-fixture",
              "url": f"file://{dev_fixture}",
              "base_branch": "develop",
          })
          with open(path, "w") as f:
              yaml.safe_dump(data, f, sort_keys=False, default_flow_style=False)
          PY

      - name: install agent CLI shims (satisfies installer prerequisite checks)
        # The installer fails loud when an active quay invocation references
        # an agent CLI that is not on PATH for the agent user. CI doesn't
        # actually run these CLIs — no-op shims satisfy the binary checks.
        # Codex verify also requires the logged-in auth shape, so seed
        # CI-only placeholder tokens with production-like permissions.
        run: |
          sudo install -d /usr/local/bin
          echo '#!/bin/bash' | sudo tee /usr/local/bin/claude > /dev/null
          printf '#!/bin/bash\necho codex-ci-shim\n' | sudo tee /usr/local/bin/codex > /dev/null
          sudo chmod 0755 /usr/local/bin/claude
          sudo chmod 0755 /usr/local/bin/codex
          sudo install -d -o hermes -g hermes -m 0700 /home/hermes/.codex
          sudo tee /home/hermes/.codex/auth.json > /dev/null <<'JSON'
          {"tokens":{"access_token":"ci-access-token","refresh_token":"ci-refresh-token"}}
          JSON
          sudo chown hermes:hermes /home/hermes/.codex/auth.json
          sudo chmod 0600 /home/hermes/.codex/auth.json

      - name: run installer (first run; should provision build deps + clone state)
        run: |
          sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh \
            --fork /srv/hermes/repos/hermes-agent \
            --state /srv/hermes/repos/hermes-state \
            --user hermes \
            --git-identity-email didier@ci

      - name: values-derived runtime config probe
        # deploy.values.yaml is the source of truth for the gateway's model
        # provider pin and for non-secret env vars (SLACK_ALLOWED_USERS,
        # LINEAR_TEAM_<KEY>). setup-hermes.sh writes auth/gateway-runtime.env
        # on every run (independent of --auth-method) and merges
        # gateway.model_* into config.yaml. Both must land cleanly on first
        # install and re-runs.
        run: |
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes

            # auth/gateway-runtime.env present, root:hermes 0640, agent-readable.
            [[ -f "$T/auth/gateway-runtime.env" ]] \
              || { echo "FAIL: $T/auth/gateway-runtime.env missing"; exit 1; }
            mode=$(stat -c "%a" "$T/auth/gateway-runtime.env")
            owner=$(stat -c "%U:%G" "$T/auth/gateway-runtime.env")
            [[ "$mode" == "640" ]]               || { echo "FAIL: gateway-runtime.env mode=$mode"; exit 1; }
            [[ "$owner" == "root:hermes" ]]      || { echo "FAIL: gateway-runtime.env owner=$owner"; exit 1; }

            # LINEAR_TEAM_ITRY is in the fork values file — must round-trip.
            grep -q "LINEAR_TEAM_ITRY=28294e03-c1ce-4c2b-ba24-49e36179a321" \
              "$T/auth/gateway-runtime.env" \
              || { echo "FAIL: LINEAR_TEAM_ITRY missing"; cat "$T/auth/gateway-runtime.env"; exit 1; }

            # config.yaml carries the merged model.provider from values.yaml.
            grep -Eq "^[[:space:]]*provider:[[:space:]]*openai-codex" \
              "$T/config.yaml" \
              || { echo "FAIL: model.provider not merged into config.yaml"; cat "$T/config.yaml"; exit 1; }

            # And the runtime drop-in references the file. The `z-` prefix is
            # load-order sensitive: systemd merges drop-ins in lexical order
            # and the values.yaml-derived value must win on collision with a
            # legacy SLACK_ALLOWED_USERS line in slack.env.
            unitd=/etc/systemd/system/hermes-gateway.service.d
            [[ -f "$unitd/z-runtime-env.conf" ]] \
              || { echo "FAIL: z-runtime-env.conf drop-in missing"; ls -la "$unitd"; exit 1; }
            grep -Fq "auth/gateway-runtime.env" "$unitd/z-runtime-env.conf" \
              || { echo "FAIL: z-runtime-env.conf does not reference gateway-runtime.env"; cat "$unitd/z-runtime-env.conf"; exit 1; }
            # Sort order assertion — last drop-in alphabetically must be ours.
            last_dropin=$(ls "$unitd"/*.conf | sort | tail -n1)
            [[ "$last_dropin" == "$unitd/z-runtime-env.conf" ]] \
              || { echo "FAIL: z-runtime-env.conf does not sort last (got: $last_dropin)"; ls "$unitd"; exit 1; }
            echo "values-derived runtime config probe: OK"
          '

      - name: permission probes (rails read-only, state writable + git-aware)
        run: |
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes

            # rails read-only
            if echo x > "$T/SOUL.md" 2>/dev/null;               then echo "FAIL: agent wrote rails SOUL.md"; exit 1; fi
            if echo x > "$T/hermes-agent/probe.py" 2>/dev/null; then echo "FAIL: agent wrote rails hermes-agent/"; exit 1; fi
            if echo x > "$T/RUNTIME_VERSION" 2>/dev/null;       then echo "FAIL: agent wrote rails RUNTIME_VERSION"; exit 1; fi

            # Agent must be able to write config.yaml — root-owned
            # silently no-ops `hermes auth add` and `hermes model`.
            [[ -f "$T/config.yaml" ]] || { echo "FAIL: $T/config.yaml missing post-install"; exit 1; }
            cfg_owner=$(stat -c "%U" "$T/config.yaml")
            [[ "$cfg_owner" == "hermes" ]] \
              || { echo "FAIL: config.yaml owner=$cfg_owner (expected hermes)"; exit 1; }
            touch -- "$T/config.yaml" \
              || { echo "FAIL: agent cannot touch config.yaml (root-owned?)"; exit 1; }

            # state symlinks resolve into the clone
            for d in skills memories cron; do
              [[ -L "$T/$d" ]] || { echo "FAIL: $T/$d is not a symlink"; exit 1; }
              target=$(readlink "$T/$d")
              [[ "$target" == "state/$d" ]] || { echo "FAIL: $T/$d -> $target (expected state/$d)"; exit 1; }
            done

            # writes through the symlinks land inside the git repo
            echo "skill-data" > "$T/skills/probe.md"
            echo "memory-data" > "$T/memories/probe.md"
            echo "cron-output-data" > "$T/cron/output/probe.txt"
            [[ -f "$T/state/skills/probe.md" ]]       || { echo "FAIL: skills write did not reach state/"; exit 1; }
            [[ -f "$T/state/memories/probe.md" ]]     || { echo "FAIL: memories write did not reach state/"; exit 1; }
            [[ -f "$T/state/cron/output/probe.txt" ]] || { echo "FAIL: cron/output write did not reach state/"; exit 1; }

            # git sees those writes as new untracked files
            cd "$T/state"
            untracked=$(git status --porcelain | wc -l)
            [[ "$untracked" -ge 3 ]] || { echo "FAIL: expected >=3 untracked entries, got $untracked"; git status; exit 1; }

            # repo-local git identity is configured (so future commits use it)
            cfg_email=$(git config user.email)
            cfg_name=$(git config user.name)
            [[ "$cfg_email" == "didier@ci" ]] || { echo "FAIL: user.email=$cfg_email"; exit 1; }
            [[ "$cfg_name"  == "didier"    ]] || { echo "FAIL: user.name=$cfg_name";  exit 1; }

            # agent can actually create a commit (no sudo, no auth needed locally)
            git add .
            git commit -q -m "ci: probe commit"
            author=$(git log -1 --format="%an <%ae>")
            [[ "$author" == "didier <didier@ci>" ]] || { echo "FAIL: commit author=$author"; exit 1; }

            "$T/hermes-agent/venv/bin/hermes" --help > /dev/null
            echo "permission probes: OK"
          '

      - name: idempotency (second run is fast no-op; preserves agent commit)
        run: |
          start=$SECONDS
          sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh \
            --fork /srv/hermes/repos/hermes-agent \
            --state /srv/hermes/repos/hermes-state \
            --user hermes \
            --git-identity-email didier@ci \
            --skip-prep
          elapsed=$(( SECONDS - start ))
          echo "second run took ${elapsed}s"
          # Threshold is generous (120s vs ~10s observed) to absorb PyPI
          # latency without flaky failures. The pip upgrade + editable
          # reinstall hits the network even on a no-op pass; bumping past
          # this should still be a real signal.
          if [ "$elapsed" -gt 120 ]; then
            echo "FAIL: second run too slow (${elapsed}s > 120s); idempotency may be broken"
            exit 1
          fi

      - name: post-second-run state preservation probe
        # Re-running the installer must NOT clobber agent work in state/. The
        # previous step made a "ci: probe commit"; it has to still be there.
        run: |
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes
            cd "$T/state"
            last_subj=$(git log -1 --format="%s")
            [[ "$last_subj" == "ci: probe commit" ]] \
              || { echo "FAIL: agent commit lost on re-run (last subject=$last_subj)"; git log --oneline | head; exit 1; }
            [[ -f skills/probe.md ]]       || { echo "FAIL: skills/probe.md missing after re-run"; exit 1; }
            [[ -f memories/probe.md ]]     || { echo "FAIL: memories/probe.md missing after re-run"; exit 1; }
            [[ -f cron/output/probe.txt ]] || { echo "FAIL: cron/output/probe.txt missing after re-run"; exit 1; }
            echo "state preservation: OK"
          '

      - name: runtime manager probes (bun + pnpm pinned + on PATH for /bin/sh)
        # repos[].quay.package_manager → installer must drop each pinned
        # manager at /usr/local/bin/<name> root:root 0755 so quay's
        # `/bin/sh -c install_cmd` (minimal PATH) finds it. The SHA pin
        # in deploy.values.yaml is the security boundary; these probes
        # assert the install-time fetch + verify + install worked for
        # both archive kinds (bun: zip recipe; pnpm: plain-binary recipe).
        run: |
          set -euo pipefail
          probe_manager() {  # $1=name
            local name="$1"
            [[ -x "/usr/local/bin/$name" ]] \
              || { echo "FAIL: $name binary missing at /usr/local/bin/$name"; exit 1; }
            local mode owner pin actual
            mode=$(stat -c "%a" "/usr/local/bin/$name")
            owner=$(stat -c "%U:%G" "/usr/local/bin/$name")
            [[ "$mode" == "755" ]]        || { echo "FAIL: $name mode=$mode (expected 755)"; exit 1; }
            [[ "$owner" == "root:root" ]] || { echo "FAIL: $name owner=$owner (expected root:root)"; exit 1; }
            pin=$(python3 /srv/hermes/repos/hermes-agent/installer/values_helper.py \
              --values /srv/hermes/repos/hermes-agent/deploy.values.yaml \
              get "quay.runtime_managers.${name}.version")
            actual=$(/usr/local/bin/"$name" --version 2>&1 | head -n1)
            # Substring match — absorbs build suffixes the upstream binary
            # may emit (e.g. `+commit-sha`) without flaking the probe.
            [[ "$actual" == *"$pin"* ]] \
              || { echo "FAIL: $name --version='$actual' does not contain pin '$pin'"; exit 1; }
            # /bin/sh -c is what quay's bootstrap uses; assert the binary
            # is reachable there (PATH must contain /usr/local/bin without
            # sourcing a profile).
            /bin/sh -c "command -v $name >/dev/null" \
              || { echo "FAIL: $name not on PATH for /bin/sh -c (quay bootstrap will fail)"; exit 1; }
            echo "runtime manager probe: OK ($name ${actual})"
          }
          # bun goes through the zip recipe; pnpm goes through the plain-
          # binary recipe (pnpm-linux-x64 is a single ELF, not a zip, so
          # it installs directly without an extract step). Both must land
          # cleanly here for any quay-managed entry to bootstrap.
          probe_manager bun
          probe_manager pnpm

      - name: quay artefact probes (binary + bare clone + registration)
        run: |
          [[ -x /usr/local/bin/quay ]] || { echo "FAIL: quay binary missing"; exit 1; }
          /usr/local/bin/quay --version
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes
            [[ -d "$T/quay" ]]                              || { echo "FAIL: quay data dir missing"; exit 1; }
            [[ -f "$T/quay/config.toml" ]]                  || { echo "FAIL: quay config.toml missing"; exit 1; }
            for spec in \
              test-factory-code:/srv/hermes/repos/quay-fixtures/test-factory-code \
              brix-indexer:/srv/hermes/repos/quay-fixtures/brix-indexer; do
              id="${spec%%:*}"
              fixture="${spec#*:}"
              [[ -d "$T/quay/repos/$id.git" ]] \
                || { echo "FAIL: bare clone missing for $id"; exit 1; }
              origin=$(git -C "$T/quay/repos/$id.git" remote get-url origin)
              [[ "$origin" == "file://$fixture" ]] \
                || { echo "FAIL: $id bare clone origin=$origin (expected file://$fixture)"; exit 1; }
            done
            registered=$(env QUAY_DATA_DIR="$T/quay" /usr/local/bin/quay repo list \
              | python3 -c "import json,sys;print(\"\\n\".join(r[\"repo_id\"] for r in json.load(sys.stdin)))")
            for id in test-factory-code brix-indexer; do
              grep -Fxq "$id" <<< "$registered" \
                || { echo "FAIL: $id not registered (got: $registered)"; exit 1; }
            done
            grep -Fxq "code-only-fixture" <<< "$registered" \
              && { echo "FAIL: code-only entry leaked into quay registrations"; exit 1; }
            [[ -d "$T/quay/repos/code-only-fixture.git" ]] \
              && { echo "FAIL: code-only entry got a bare clone"; exit 1; }
            echo "quay artefact probes: OK"
          '

      - name: code mirror probes (every repos[] entry has one)
        # All four repos[] entries (quay-managed test-factory-code on main
        # and brix-indexer on dev, code-only-fixture on main,
        # non-default-branch-fixture on develop) must produce a working-
        # tree clone at $T/code/<id>/, agent-owned, on origin/<base_branch>.
        # The mirror is what hermes-code-sync refreshes on its 5-min timer.
        run: |
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes
            [[ -d "$T/code" ]] || { echo "FAIL: code mirrors root missing at $T/code"; exit 1; }
            # Format: id:expected_base
            for spec in \
              test-factory-code:main \
              brix-indexer:dev \
              code-only-fixture:main \
              non-default-branch-fixture:develop; do
              id="${spec%:*}"
              base_branch="${spec#*:}"
              [[ -d "$T/code/$id/.git" ]] \
                || { echo "FAIL: code mirror missing for $id at $T/code/$id"; exit 1; }
              [[ -f "$T/code/$id/README.md" ]] \
                || { echo "FAIL: working tree empty for $id (clone vs --bare regression?)"; exit 1; }
              owner=$(stat -c "%U" "$T/code/$id/.git")
              [[ "$owner" == "hermes" ]] \
                || { echo "FAIL: $id .git owner=$owner (expected hermes)"; exit 1; }
              head=$(git -C "$T/code/$id" rev-parse HEAD)
              expected=$(git -C "$T/code/$id" rev-parse "origin/$base_branch")
              [[ "$head" == "$expected" ]] \
                || { echo "FAIL: $id HEAD ($head) != origin/$base_branch ($expected)"; exit 1; }
            done
            echo "code mirror probes: OK"
          '

      - name: hermes-code-sync timer probe (enabled + active + base_branch honoured)
        # Beyond enabled/active, this exercises the regression test for
        # the origin/HEAD bug: non-default-branch-fixture has base_branch
        # develop but origin/HEAD points at main. After a tick, the mirror
        # MUST stay on origin/develop, not snap to origin/main.
        run: |
          systemctl is-enabled hermes-code-sync.timer >/dev/null \
            || { echo "FAIL: hermes-code-sync.timer not enabled"; exit 1; }
          systemctl is-active hermes-code-sync.timer >/dev/null \
            || { echo "FAIL: hermes-code-sync.timer not active"; exit 1; }
          # Trigger one tick synchronously and assert it exits 0.
          sudo systemctl start hermes-code-sync.service
          if systemctl is-failed hermes-code-sync.service >/dev/null; then
            echo "FAIL: hermes-code-sync.service entered failed state"
            sudo journalctl -u hermes-code-sync.service -n 30 --no-pager
            exit 1
          fi
          # Post-tick assertion: every mirror remains on origin/<base_branch>.
          # The develop fixture is the load-bearing case — if hermes-code-sync
          # ever resolves base from origin/HEAD again, this snaps to
          # origin/main and the assertion below fires.
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes
            for spec in \
              test-factory-code:main \
              brix-indexer:dev \
              code-only-fixture:main \
              non-default-branch-fixture:develop; do
              id="${spec%:*}"
              base_branch="${spec#*:}"
              head=$(git -C "$T/code/$id" rev-parse HEAD)
              expected=$(git -C "$T/code/$id" rev-parse "origin/$base_branch")
              [[ "$head" == "$expected" ]] \
                || { echo "FAIL post-tick: $id HEAD=$head expected=origin/$base_branch=$expected"; exit 1; }
            done
            echo "hermes-code-sync timer probe: OK"
          '

      - name: stage-repo-auth.sh probe (key + known_hosts + deploy-key checklist)
        # The smoke-test's main values file has its repos[].url rewritten to
        # file:///... so it never tries the network. To exercise the
        # github.com path of stage-repo-auth.sh (and the deploy-key
        # checklist) we feed it a tiny fixture YAML with a real GitHub-
        # shaped URL via VALUES_FILE — the URL is never cloned, we only
        # want the SSH-key + checklist artefacts.
        # The fixture mixes a code-only entry (deploy-key URL must appear)
        # with a quay-managed entry (URL must NOT appear — that path uses
        # the App credential helper, not a deploy key).
        run: |
          FIXTURE_YAML=$(mktemp /tmp/repo-auth-fixture-XXXXXX.yaml)
          cat > "$FIXTURE_YAML" <<'YAML'
          repos:
            - id: code-only-fixture
              url: https://github.com/InverterNetwork/code-only-fixture
              base_branch: main
            - id: test-factory-code
              url: https://github.com/InverterNetwork/test-factory-code
              base_branch: main
              quay:
                package_manager: bun
                install_cmd: bun install
          YAML
          sudo chmod 644 "$FIXTURE_YAML"

          # First run — pubkey shouldn't exist yet. Capture stdout so we
          # can assert the bifurcated checklist behavior.
          OUT=$(sudo VALUES_FILE="$FIXTURE_YAML" \
            /srv/hermes/repos/hermes-agent/stage-repo-auth.sh)
          echo "$OUT"
          grep -Fq "https://github.com/InverterNetwork/code-only-fixture/settings/keys" <<<"$OUT" \
            || { echo "FAIL: code-only deploy-key checklist URL missing"; exit 1; }
          grep -Fq "https://github.com/InverterNetwork/test-factory-code/settings/keys" <<<"$OUT" \
            && { echo "FAIL: quay-managed entry leaked into deploy-key checklist"; exit 1; } \
            || true

          # Probe as hermes: key + known_hosts staged with correct perms.
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes
            key_mode=$(stat -c "%a" "$T/.ssh/id_ed25519")
            [[ "$key_mode" == "600" ]] \
              || { echo "FAIL: id_ed25519 mode=$key_mode (expected 600)"; exit 1; }
            kh_mode=$(stat -c "%a" "$T/.ssh/known_hosts")
            [[ "$kh_mode" == "644" ]] \
              || { echo "FAIL: known_hosts mode=$kh_mode (expected 644)"; exit 1; }
            grep -q "github.com ssh-" "$T/.ssh/known_hosts" \
              || { echo "FAIL: known_hosts missing github.com keys"; exit 1; }
            echo "auth probes: key + known_hosts OK"
          '

          # Idempotency: capture pubkey sha256, re-run, assert unchanged.
          PUB_SHA_BEFORE=$(sudo -u hermes sha256sum /home/hermes/.ssh/id_ed25519.pub | awk '{print $1}')
          sudo VALUES_FILE="$FIXTURE_YAML" \
            /srv/hermes/repos/hermes-agent/stage-repo-auth.sh
          PUB_SHA_AFTER=$(sudo -u hermes sha256sum /home/hermes/.ssh/id_ed25519.pub | awk '{print $1}')
          [[ "$PUB_SHA_BEFORE" == "$PUB_SHA_AFTER" ]] \
            || { echo "FAIL: pubkey changed on re-run (not idempotent)"; exit 1; }
          echo "stage-repo-auth.sh idempotency: OK"

          rm -f "$FIXTURE_YAML"

      - name: per-repo url.insteadOf probe (setup-hermes.sh writes for code-only, unsets for quay-managed)
        # The url.insteadOf rewrite that bridges HTTPS → SSH lives in
        # setup-hermes.sh's repos[] loop now (not stage-repo-auth.sh). Run
        # the install script's regex + write + unset snippets against a
        # github.com URL fixture so the bash logic is exercised independently
        # of an actual clone (which would need real GitHub creds). Covers
        # both branches of the bifurcation: write for code-only entries,
        # unset for quay-managed entries (the upgrade-path fix that strips
        # stale rewrites left by pre-consolidation installs).
        run: |
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes
            cd "$T"  # git stats CWD even with --file
            repo_url="https://github.com/InverterNetwork/per-repo-probe"
            [[ "$repo_url" =~ ^https://github\.com/([^/]+)/([^/]+)$ ]] \
              || { echo "FAIL: regex did not match clean github.com URL"; exit 1; }
            org="${BASH_REMATCH[1]}"
            repo_short="${BASH_REMATCH[2]}"
            ssh_url="git@github.com:${org}/${repo_short}.git"

            # Write branch (code-only entry).
            git config --file "$T/.gitconfig" "url.${ssh_url}.insteadOf" "$repo_url"
            actual=$(git config --file "$T/.gitconfig" --get "url.${ssh_url}.insteadOf")
            [[ "$actual" == "$repo_url" ]] \
              || { echo "FAIL: per-repo rewrite did not land: got $actual"; exit 1; }

            # Unset branch (quay-managed entry: clears stale rewrite from a
            # pre-consolidation install). First call removes the entry; a
            # second call must succeed too (exit 5 = key absent) so re-runs
            # of the installer are idempotent.
            unset_rc=0
            git config --file "$T/.gitconfig" --unset-all "url.${ssh_url}.insteadOf" || unset_rc=$?
            (( unset_rc == 0 )) \
              || { echo "FAIL: first unset-all returned $unset_rc"; exit 1; }
            unset_rc=0
            git config --file "$T/.gitconfig" --unset-all "url.${ssh_url}.insteadOf" || unset_rc=$?
            (( unset_rc == 5 )) \
              || { echo "FAIL: second unset-all returned $unset_rc (expected 5)"; exit 1; }
            git config --file "$T/.gitconfig" --get "url.${ssh_url}.insteadOf" \
              && { echo "FAIL: rewrite still present after unset-all"; exit 1; } \
              || true

            # Migration shape: pre-consolidation installs wrote the rewrite
            # key WITHOUT the .git suffix. Seed that shape and exercise the
            # installer-style suffix-iterating loop — a single-shape unset
            # would silently no-op (exit 5) and leave the rewrite to shadow
            # the App credential helper at clone time.
            no_suffix_url="git@github.com:${org}/${repo_short}"
            git config --file "$T/.gitconfig" "url.${no_suffix_url}.insteadOf" "$repo_url"
            for migration_suffix in "" ".git"; do
              probe_url="git@github.com:${org}/${repo_short}${migration_suffix}"
              unset_rc=0
              git config --file "$T/.gitconfig" --unset-all "url.${probe_url}.insteadOf" || unset_rc=$?
              (( unset_rc == 0 || unset_rc == 5 )) \
                || { echo "FAIL: migration unset suffix=${migration_suffix} returned $unset_rc"; exit 1; }
            done
            git config --file "$T/.gitconfig" --get "url.${no_suffix_url}.insteadOf" \
              && { echo "FAIL: no-suffix rewrite still present after suffix-iterating unset"; exit 1; } \
              || true
            echo "per-repo url.insteadOf probe: OK (write + unset + migration shapes)"
          '

      - name: hermes-env drop-in probe
        run: |
          set -euo pipefail
          DROPIN=/etc/systemd/system/hermes-gateway.service.d/hermes-env.conf
          if [[ ! -f "$DROPIN" ]]; then
            echo "FAIL: hermes-env drop-in missing at $DROPIN"
            sudo ls -la /etc/systemd/system/hermes-gateway.service.d/ 2>&1 || true
            exit 1
          fi
          sudo grep -Fxq "EnvironmentFile=-/home/hermes/.hermes/auth/hermes.env" "$DROPIN" \
            || { echo "FAIL: drop-in missing expected EnvironmentFile line"; sudo cat "$DROPIN"; exit 1; }
          echo "hermes-env drop-in probe: OK"

      - name: --verify post-install (catch regressions in verify itself)
        # Running `--verify` against the rendered install catches drift in
        # the verify path before it ships. Without this gate, regressions
        # like positional parsing of `systemctl show` only surface on-host,
        # post-merge.
        #
        # Two drifts are tolerated and asserted-to-exist as the expected
        # CI envelope:
        #   * rails perms — `pip install -e .` leaves egg-info entries
        #     group/world-writable; CI-only fixture artefact.
        #   * state origin — CI fakes the state repo as a filesystem path;
        #     real installs clone github.com.
        #
        # Anything outside that envelope is a regression and fails the gate.
        # The closing sanity loop also fails if any known label disappears
        # from output so the filter doesn't rot into a silent pass-through.
        run: |
          set -euo pipefail
          sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh --verify \
            --fork /srv/hermes/repos/hermes-agent \
            --target /home/hermes/.hermes \
            --user hermes \
            > verify.out 2> verify.err || true
          echo "=== verify stdout (OK lines) ==="
          cat verify.out
          echo "=== verify stderr (DRIFT lines) ==="
          cat verify.err
          unexpected=$(grep '^\[DRIFT\]' verify.err \
            | grep -Ev '^\[DRIFT\] (rails perms|state origin):' \
            || true)
          if [[ -n "$unexpected" ]]; then
            echo "FAIL: --verify reported drift outside the known CI envelope:"
            echo "$unexpected"
            exit 1
          fi
          for label in 'rails perms' 'state origin'; do
            grep -q "^\[DRIFT\] ${label}:" verify.err \
              || { echo "FAIL: expected known drift '${label}' missing from --verify output (filter likely stale; remove it from the grep -Ev list)"; exit 1; }
          done
          echo "--verify probe: OK (only known drifts present)"

      - name: --force-state probe (opt-in re-clone wipes local work)
        run: |
          sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh \
            --fork /srv/hermes/repos/hermes-agent \
            --state /srv/hermes/repos/hermes-state \
            --user hermes \
            --git-identity-email didier@ci \
            --skip-prep \
            --force-state
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes
            cd "$T/state"
            last_subj=$(git log -1 --format="%s")
            [[ "$last_subj" == "init fixture" ]] \
              || { echo "FAIL: --force-state did not reset to source HEAD (last subject=$last_subj)"; exit 1; }
            [[ ! -f skills/probe.md ]]       || { echo "FAIL: skills/probe.md survived --force-state"; exit 1; }
            [[ ! -f memories/probe.md ]]     || { echo "FAIL: memories/probe.md survived --force-state"; exit 1; }
            [[ ! -f cron/output/probe.txt ]] || { echo "FAIL: cron/output/probe.txt survived --force-state"; exit 1; }
            echo "--force-state probe: OK"
          '

      - name: --auth-method app probe (token helper + credential wiring)
        # End-to-end exercise of the GitHub App auth path on top of the
        # already-rendered target. We don't have real GitHub credentials in CI,
        # so we mock /app/installations/<id>/access_tokens on localhost and
        # point the installer at it via --gh-api-base. A throwaway RSA key
        # stands in for the App's PEM.
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          openssl genrsa -out "$WORK/fake-app.pem" 2048 2>/dev/null
          chmod 600 "$WORK/fake-app.pem"

          # Mock GitHub API: always returns a fake installation token. Listens
          # on 127.0.0.1:8765 in the background; killed on cleanup.
          python3 - <<'PY' &
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json
          class H(BaseHTTPRequestHandler):
              def do_POST(self):
                  body = json.dumps({"token": "ghs_ci_fake", "expires_at": "2099-01-01T00:00:00Z"}).encode()
                  self.send_response(201)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a, **k): pass
          HTTPServer(("127.0.0.1", 8765), H).serve_forever()
          PY
          MOCK_PID=$!
          trap 'kill $MOCK_PID 2>/dev/null || true' EXIT
          # Wait for the mock to be ready (max 5s).
          for _ in $(seq 1 50); do
            if curl -fsS -X POST http://127.0.0.1:8765/ping >/dev/null 2>&1 \
              || nc -z 127.0.0.1 8765 2>/dev/null; then break; fi
            sleep 0.1
          done

          sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh \
            --fork /srv/hermes/repos/hermes-agent \
            --state /srv/hermes/repos/hermes-state \
            --user hermes \
            --git-identity-email didier@ci \
            --skip-prep \
            --auth-method app \
            --app-id 12345 \
            --app-installation-id 67890 \
            --app-key-path "$WORK/fake-app.pem" \
            --gh-api-base http://127.0.0.1:8765

          # Probes (run as hermes — the agent must be able to do all of this).
          sudo -u hermes bash -euo pipefail -c '
            T=/home/hermes/.hermes

            # Auth dir + files exist with the expected perms.
            [[ -d "$T/auth" ]]                         || { echo "FAIL: $T/auth missing"; exit 1; }
            [[ -f "$T/auth/github-app.pem" ]]          || { echo "FAIL: pem missing"; exit 1; }
            [[ -f "$T/auth/github-app.env" ]]          || { echo "FAIL: env missing"; exit 1; }
            mode=$(stat -c "%a" "$T/auth")
            [[ "$mode" == "750" ]]                     || { echo "FAIL: auth/ mode=$mode (expected 750)"; exit 1; }
            mode=$(stat -c "%a" "$T/auth/github-app.pem")
            [[ "$mode" == "640" ]]                     || { echo "FAIL: pem mode=$mode (expected 640)"; exit 1; }
            owner=$(stat -c "%U:%G" "$T/auth/github-app.pem")
            [[ "$owner" == "root:hermes" ]]            || { echo "FAIL: pem owner=$owner (expected root:hermes)"; exit 1; }

            # Agent can read the env file (group access is the whole point).
            grep -q "HERMES_GH_APP_ID=12345"           "$T/auth/github-app.env"
            grep -q "HERMES_GH_INSTALLATION_ID=67890"  "$T/auth/github-app.env"
            grep -q "HERMES_GH_API=http://127.0.0.1:8765" "$T/auth/github-app.env"

            # Credential helper is wired into state/.git/config.
            cd "$T/state"
            helper=$(git config credential.https://github.com.helper)
            [[ "$helper" == *hermes_github_token.py* ]] || { echo "FAIL: credential helper not set: $helper"; exit 1; }

            # `check` exercises the full mint path (JWT, API call, cache write)
            # without ever printing the token. The installer itself uses this.
            "$T/hermes-agent/venv/bin/python" \
              "$T/hermes-agent/installer/hermes_github_token.py" check

            # Mint a token through the helper (hits the localhost mock; this
            # value is the hard-coded fixture token, never a real credential).
            tok=$("$T/hermes-agent/venv/bin/python" \
                  "$T/hermes-agent/installer/hermes_github_token.py" mint)
            [[ "$tok" == "ghs_ci_fake" ]] || { echo "FAIL: minted token=$tok"; exit 1; }

            # credential helper protocol output is shaped correctly.
            out=$(printf "protocol=https\nhost=github.com\n\n" \
                  | "$T/hermes-agent/venv/bin/python" \
                    "$T/hermes-agent/installer/hermes_github_token.py" credential get)
            grep -q "^username=x-access-token$" <<< "$out"
            grep -q "^password=ghs_ci_fake$" <<< "$out"

            # Defense-in-depth: helper must refuse credentials for non-github
            # hosts even when invoked unscoped. Empty output = no credential.
            out=$(printf "protocol=https\nhost=evil.example.com\n\n" \
                  | "$T/hermes-agent/venv/bin/python" \
                    "$T/hermes-agent/installer/hermes_github_token.py" credential get)
            [[ -z "$out" ]] || { echo "FAIL: helper served credentials to non-github: $out"; exit 1; }

            # Persisted credential helper bakes HERMES_HOME — non-default
            # --target installs would otherwise misroute on later git pushes.
            persisted=$(git config credential.https://github.com.helper)
            [[ "$persisted" == *"HERMES_HOME="* ]] \
              || { echo "FAIL: persisted helper missing HERMES_HOME: $persisted"; exit 1; }

            echo "auth probes: OK"
          '

      - name: non-default --target probe (HERMES_HOME baked in helper)
        # Verify a fresh install at /opt/hermes (not the default ~hermes/.hermes)
        # produces a credential helper that resolves auth/ + cache/ at the right
        # path, even with HOME pointing elsewhere on later git operations.
        run: |
          set -euo pipefail
          # Reuse the mock from the previous step would be cleaner, but this
          # step has its own isolated lifetime. Spin up a fresh one.
          python3 - <<'PY' &
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json
          class H(BaseHTTPRequestHandler):
              def do_POST(self):
                  body = json.dumps({"token": "ghs_ci_fake_alt", "expires_at": "2099-01-01T00:00:00Z"}).encode()
                  self.send_response(201)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a, **k): pass
          HTTPServer(("127.0.0.1", 8766), H).serve_forever()
          PY
          MOCK_PID=$!
          trap 'kill $MOCK_PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 50); do nc -z 127.0.0.1 8766 2>/dev/null && break; sleep 0.1; done

          sudo useradd -m -s /bin/bash hermes2 || true
          WORK=$(mktemp -d)
          openssl genrsa -out "$WORK/fake-app2.pem" 2048 2>/dev/null

          sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh \
            --fork /srv/hermes/repos/hermes-agent \
            --state /srv/hermes/repos/hermes-state \
            --user hermes2 \
            --target /opt/hermes2 \
            --git-identity-email didier@ci2 \
            --skip-prep \
            --auth-method app \
            --app-id 99999 \
            --app-installation-id 88888 \
            --app-key-path "$WORK/fake-app2.pem" \
            --gh-api-base http://127.0.0.1:8766

          # Probe as hermes2 from a shell with HERMES_HOME unset: the persisted
          # helper bakes its own HERMES_HOME, and as a fallback the helper
          # self-locates from __file__. Either way must resolve /opt/hermes2.
          sudo -u hermes2 bash -euo pipefail -c '
            unset HERMES_HOME
            T=/opt/hermes2
            # Pull the persisted helper command, strip the leading "!", then
            # invoke it via sh just like git would.
            helper=$(git -C "$T/state" config credential.https://github.com.helper)
            cmd=${helper#!}
            out=$(printf "protocol=https\nhost=github.com\n\n" | sh -c "$cmd get")
            grep -q "^password=ghs_ci_fake_alt$" <<< "$out" \
              || { echo "FAIL: non-default --target helper output: $out"; exit 1; }
            echo "non-default --target probe: OK"
          '

      - name: codex worker CLI probe
        # The installer should replace the CI shim with the pinned, root-managed
        # Codex binary and expose it through /usr/local/bin/codex.
        run: |
          set -euo pipefail
          [[ -L /usr/local/bin/codex ]] || { echo "FAIL: /usr/local/bin/codex is not a symlink"; exit 1; }
          target=$(readlink /usr/local/bin/codex)
          [[ "$target" == "/usr/local/bin/.codex.hermes-managed" ]] \
            || { echo "FAIL: /usr/local/bin/codex -> $target"; exit 1; }
          [[ -x "$target" ]] || { echo "FAIL: managed codex binary missing or not executable at $target"; exit 1; }
          mode=$(stat -c "%a" "$target")
          owner=$(stat -c "%U:%G" "$target")
          [[ "$mode" == "755" ]]        || { echo "FAIL: codex mode=$mode (expected 755)"; exit 1; }
          [[ "$owner" == "root:root" ]] || { echo "FAIL: codex owner=$owner (expected root:root)"; exit 1; }
          pin=$(python3 /srv/hermes/repos/hermes-agent/installer/values_helper.py \
            --values /srv/hermes/repos/hermes-agent/deploy.values.yaml \
            get quay.codex.version)
          pin=${pin#rust-v}
          actual=$(/usr/local/bin/codex --version 2>&1 | head -n1)
          [[ "$actual" == *"$pin"* ]] \
            || { echo "FAIL: codex --version='$actual' does not contain pin '$pin'"; exit 1; }
          echo "codex worker CLI probe: OK ($actual)"

      - name: codex auth verify fail-loud probe
        # The binary is provisioned, but the OAuth session remains an operator
        # step. Verify must fail loudly when active codex workers lack auth.json.
        run: |
          set -euo pipefail
          sudo rm -f /home/hermes/.codex/auth.json
          set +e
          out=$(sudo /srv/hermes/repos/hermes-agent/installer/setup-hermes.sh \
            --fork /srv/hermes/repos/hermes-agent \
            --state /srv/hermes/repos/hermes-state \
            --user hermes \
            --git-identity-email didier@ci \
            --verify 2>&1)
          rc=$?
          set -e
          [[ $rc -ne 0 ]] || { echo "FAIL: verify should have exited non-zero when codex auth is absent"; exit 1; }
          echo "$out" | grep -q "codex auth" || { echo "FAIL: verify output should mention codex auth; got: $out"; exit 1; }
          sudo tee /home/hermes/.codex/auth.json > /dev/null <<'JSON'
          {"tokens":{"access_token":"ci-access-token","refresh_token":"ci-refresh-token"}}
          JSON
          sudo chown hermes:hermes /home/hermes/.codex/auth.json
          sudo chmod 0600 /home/hermes/.codex/auth.json
          echo "codex auth verify fail-loud probe: OK"

      - name: render summary on failure
        if: failure()
        run: |
          echo "=== render target ==="
          sudo ls -la /home/hermes/.hermes/ || true
          echo "=== auth dir ==="
          sudo ls -la /home/hermes/.hermes/auth/ 2>/dev/null || true
          echo "=== state .git/config ==="
          sudo cat /home/hermes/.hermes/state/.git/config 2>/dev/null || true
          echo "=== runtime version ==="
          sudo cat /home/hermes/.hermes/RUNTIME_VERSION || true
          echo "=== venv contents (head) ==="
          sudo ls /home/hermes/.hermes/hermes-agent/venv/bin/ | head -20 || true
