# Drop-in for values-derived env vars (sibling of slack-env.conf and
# hermes-env.conf). The file at __TARGET_DIR__/auth/gateway-runtime.env is
# rewritten on every setup-hermes.sh run from deploy.values.yaml — it
# carries non-secret config that the gateway reads from env (e.g.
# SLACK_ALLOWED_USERS). Do not hand-edit the file; edit deploy.values.yaml
# and re-run the installer.
#
# The `z-` prefix is intentional. systemd loads drop-ins in lexical order,
# and later EnvironmentFile= entries override earlier ones for any var that
# appears in more than one file. Sorting last means the values.yaml-derived
# value wins over a stale SLACK_ALLOWED_USERS line baked into a legacy
# slack.env (i.e. one staged before the line was dropped from
# stage-secrets.sh). Don't rename without re-checking the load order.
#
# Leading `-` on EnvironmentFile= tolerates an absent file (early-stage
# installs); __TARGET_DIR__ is templated by setup-hermes.sh.

[Service]
EnvironmentFile=-__TARGET_DIR__/auth/gateway-runtime.env
