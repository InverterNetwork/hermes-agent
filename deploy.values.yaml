# Per-organization values for this hermes-agent fork.
#
# Re-forking for a different org: copy this file, change every value, then
# re-run installer/setup-hermes.sh on the target host. Tokens never live here
# — they're staged at install time into <target>/auth/*.env (mode 0640
# root:hermes) by stage-secrets.sh and never committed.
#
# Schema:
#   org.name                   — display label only; not currently consumed
#                                 by code, used as documentation.
#   org.agent_identity_name    — git user.name on commits the agent makes back
#                                 to hermes-state. Surfaces in `git log` so
#                                 deploys are self-identifying.
#
#   slack.app                  — fields rendered into installer/slack-manifest.json
#                                 at install time. The rendered file is what
#                                 the operator pastes into Slack's manifest UI
#                                 when creating/updating the App.
#   slack.runtime              — fields seeded into <target>/config.yaml on
#                                 first install. Preserved across re-runs (the
#                                 installer never overwrites a live config) so
#                                 operator hand-edits survive.
#   slack.runtime.allowed_users — Slack member IDs (U…) authorized to talk to
#                                 the bot. Source of truth for the gateway's
#                                 SLACK_ALLOWED_USERS env var; the installer
#                                 writes a comma-joined value into
#                                 <target>/auth/gateway-runtime.env on every
#                                 run, so re-installs and rotations don't ask
#                                 the operator to re-type the list. Empty list
#                                 emits an explicit `SLACK_ALLOWED_USERS=` so
#                                 the later-loaded gateway-runtime.env wipes
#                                 stale values from auth/slack.env that older
#                                 stage-secrets.sh runs may have left behind.
#   slack.runtime.allowed_channels — Slack channel IDs (C…/G…) the bot is
#                                 permitted to respond in. Source of truth
#                                 for SLACK_ALLOWED_CHANNELS; installer writes
#                                 a comma-joined value into gateway-runtime.env.
#                                 Same drift-fix semantics as allowed_users:
#                                 empty list clears stale env values from
#                                 legacy auth/slack.env. The trigger router
#                                 ignores this gate (slack_triggers below run
#                                 regardless), so only the normal agent flow
#                                 honours the allowlist.
#   slack.runtime.home_channel — optional Slack channel ID for the gateway's
#                                 home channel. Rendered into
#                                 SLACK_HOME_CHANNEL in gateway-runtime.env on
#                                 every install so cron results and
#                                 cross-platform messages have a deployment-
#                                 managed fallback target.
#
#   quay.admin.allowed_users   — Slack member IDs (U…) authorized to request
#                                 Quay Admin access. Source of truth for
#                                 QUAY_ADMIN_ALLOWED_USERS in gateway-
#                                 runtime.env. Empty/unset fails closed: no
#                                 user can pass POST /quay/admin/authorize.
#                                 Wildcard access is intentionally unsupported.
#                                 The Quay Admin allowlist is independent of
#                                 slack.runtime.allowed_users,
#                                 GATEWAY_ALLOWED_USERS, and
#                                 GATEWAY_ALLOW_ALL_USERS; general gateway
#                                 access never grants Quay Admin access.
#   quay.admin.public_base_url
#                               — externally reachable Hermes dashboard base
#                                 URL used when Slack DMs Quay Admin login
#                                 links. Rendered into
#                                 QUAY_ADMIN_PUBLIC_BASE_URL in
#                                 gateway-runtime.env on every install.
#
#   gateway.model_provider     — provider key persisted into <target>/config.yaml
#                                 under model.provider (e.g. "openai-codex",
#                                 "anthropic", "openrouter"). The installer
#                                 merges this into config.yaml on every run,
#                                 so a successful `hermes auth add` is no
#                                 longer required to land the right pin
#                                 (the CLI's config-update step can fail
#                                 silently when config.yaml is root-owned).
#   gateway.model_default      — optional default model id persisted under
#                                 model.default. Needed for providers like
#                                 openai-codex where scheduled/background
#                                 turns cannot infer a safe model when only
#                                 model.provider is configured.
#   gateway.model_base_url     — optional override for the provider's default
#                                 base URL. Leave empty to use the provider
#                                 default; set only for self-hosted endpoints
#                                 or routing through a gateway.
#   gateway.vision_provider    : optional override for the auxiliary vision
#                                 task (vision_analyze tool plus Slack-channel
#                                 image pre-analysis). Empty/unset leaves the
#                                 task on its auto-detect path (openrouter,
#                                 then nous, then main). Pin when the main
#                                 provider's auto path can't resolve a
#                                 vision-capable model on its own. For
#                                 example, openai-codex with no explicit
#                                 model silently fails vision; pinning codex
#                                 plus a model here lands it. Merged into
#                                 config.yaml as auxiliary.vision.provider on
#                                 every install; unset drops the key.
#   gateway.vision_model       : optional model id paired with
#                                 gateway.vision_provider. Required by some
#                                 providers (codex has no safe default, the
#                                 allow-list shifts). Leave empty for
#                                 providers that ship a sensible default
#                                 (openrouter, nous). Same declarative-drop
#                                 semantics as the vision_provider pin.
#   gateway.allow_all_users    — optional bool. When true, sets
#                                 GATEWAY_ALLOW_ALL_USERS=true in gateway-
#                                 runtime.env, which disables the gateway's
#                                 per-user allowlist check and trusts
#                                 channel-level gating (slack.runtime.
#                                 allowed_channels above) as the only authz
#                                 layer. Right for deployments where private-
#                                 channel membership is the access control:
#                                 anyone the operator invited into a listed
#                                 channel can talk to the bot. Leave false /
#                                 unset to keep enforcement at the user level
#                                 via slack.runtime.allowed_users.
#   gateway.approvals_mode     — optional values-driven command approval mode
#                                 merged into <target>/config.yaml as
#                                 approvals.mode on every install. Valid:
#                                 manual, smart, off. Use off only for trusted
#                                 internal Slack deployments; hardline-blocked
#                                 commands remain blocked.
#   gateway.api_server          — optional non-secret API Server wiring
#                                 rendered into auth/gateway-runtime.env.
#                                 The bearer token is the actual secret and
#                                 stays in auth/hermes.env as API_SERVER_KEY.
#                                 This deployment uses the local API Server as
#                                 the server-to-server target for Quay's Agent
#                                 Gateway, so host/port are loopback-only
#                                 config-as-code values here.
#
#   auth.github_app.id         — numeric GitHub App ID. Identifier (not a
#                                 secret); committing here means re-installs
#                                 stop asking for `--app-id`. The PEM private
#                                 key is the actual secret and stays out-of-
#                                 band (`--app-key-path`).
#                                 The App's repository scope (configured in
#                                 the GitHub UI under the App's installation
#                                 settings) is what authorizes the agent's
#                                 reads and writes against repos[].quay-managed
#                                 entries (code mirror clones + bare clone
#                                 pushes), in addition to the hermes-state
#                                 push the App already fronted.
#   auth.github_app.installation_id — numeric installation ID for the App's
#                                 install in this org. Same identifier rules
#                                 as `auth.github_app.id`.
#   auth.github_app.api_base   — optional override of the GitHub API base URL
#                                 (e.g. for GitHub Enterprise or a CI mock).
#                                 Empty = production github.com.
#
#   linear.teams              — map of <team_key>: <team_uuid> exposed to the
#                                 gateway as LINEAR_TEAM_<KEY> env vars
#                                 (auth/gateway-runtime.env). Skills like
#                                 inverter-linear reference these instead of
#                                 hardcoding UUIDs, so re-templating for
#                                 another team takes one entry here. Team
#                                 UUIDs are identifiers, not secrets.
#
#   repos                      — unified list of repos this deployment cares
#                                 about. Every entry produces a code mirror
#                                 (full working tree at <HERMES_HOME>/code/<id>/,
#                                 agent-owned, refreshed by the hermes-code-sync
#                                 timer) that the gateway can grep/read when
#                                 answering codebase questions in Slack.
#                                 Entries that ALSO carry a `quay:` block are
#                                 additionally registered with quay (bare clone
#                                 + `quay repo add`). The presence of the
#                                 `quay:` block IS the toggle — there is no
#                                 separate `enabled` flag.
#                                 Auth is bifurcated by entry type:
#                                   quay-managed entries (with `quay:` block):
#                                     code mirror + bare clone both clone over
#                                     HTTPS using a per-repo git credential
#                                     helper that calls the GitHub App. The
#                                     App's repository scope (GitHub UI) is the
#                                     only operator-side toggle — no deploy key
#                                     or url.insteadOf rewrite required. The
#                                     same App already fronts hermes-state push.
#                                   code-only entries (no `quay:` block):
#                                     github.com URLs are bridged to SSH
#                                     transport via per-repo url.insteadOf
#                                     rewrites that the installer wires into
#                                     ~<agent>/.gitconfig; a deploy key on each
#                                     repo (staged by stage-repo-auth.sh) is
#                                     the credential.
#   repos[].id                 — must match `^[A-Za-z0-9_][A-Za-z0-9._-]*$`
#                                 (alnum/./-/_, no path separators, no leading
#                                 dot or dash). The id lands in a filesystem
#                                 path and (for quay-managed entries) a CLI
#                                 flag.
#   repos[].url                — HTTPS GitHub URL (https://github.com/<org>/<repo>),
#                                 no `.git` suffix. For quay-managed entries
#                                 the URL is used as-is (HTTPS, App credential
#                                 helper); for code-only entries the installer
#                                 applies a per-repo url.insteadOf rewrite so
#                                 `git clone`/`fetch` lands over SSH against
#                                 the deploy key.
#   repos[].base_branch        — required for every entry. The code mirror is
#                                 hard-reset to origin/<base_branch> on every
#                                 hermes-code-sync tick.
#   repos[].quay               — OPTIONAL. Presence of the block opts the
#                                 entry into quay management (bare clone at
#                                 <HERMES_HOME>/quay/repos/<id>.git/ + `quay
#                                 repo add`). When present, must carry
#                                 `package_manager` and `install_cmd`. Absence
#                                 of the block leaves the entry as a code
#                                 mirror only (no quay registration, no
#                                 worker spawn).
#   repos[].quay.test_cmd      — OPTIONAL repo metadata stored in Quay.
#   repos[].quay.ci_workflow_name
#                               — OPTIONAL legacy CI workflow metadata stored
#                                 in Quay.
#   repos[].quay.contribution_guide_path
#                               — OPTIONAL repo-local contribution guide path.
#   repos[].quay.agent_worker / agent_reviewer
#                               — OPTIONAL Quay worker/reviewer agent override
#                                 for this repo. `worker_agent` /
#                                 `reviewer_agent` aliases are accepted.
#   repos[].quay.model_worker / model_reviewer
#                               — OPTIONAL worker/reviewer model override for
#                                 this repo. `worker_model` /
#                                 `reviewer_model` aliases are accepted.
#                                 These mutable repo fields are reconciled into
#                                 existing Quay registrations on every install.
#   repos[].quay.tags          — OPTIONAL per-repo tag vocabulary, namespace
#                                 → list of allowed values. Reconciled into
#                                 quay via `quay repo apply-tags --from -`
#                                 on every install (declarative replace —
#                                 dropping a namespace from values clears it
#                                 in quay). Namespace charset `[a-z0-9]+` (no
#                                 dashes — quay splits ticket tags on the
#                                 first dash); value charset `[a-z0-9-]+`.
#                                 Per-repo presence of any vocab is the
#                                 opt-in signal: quay's validator switches
#                                 from charset-only to namespace enforcement
#                                 the moment any per-repo entry exists.
#
#   quay.version               — pinned quay release tag (e.g. "v0.1.0"), or
#                                 empty to skip all quay provisioning. Empty
#                                 lets a fork stage before a quay release is
#                                 cut and is the default in CI. When set, the
#                                 installer fetches quay-linux-<arch> from
#                                 quay.release_repo's matching GitHub Release
#                                 and verifies it against SHA256SUMS; the pin
#                                 is the security boundary. Must be set for any
#                                 repos[] entry to be quay-managed; entries with
#                                 a `quay:` block but no quay.version pin
#                                 install as code-only with a one-line warning.
#   quay.release_repo          — public GitHub owner/repo slug that publishes
#                                 Quay release assets. Keep public so the
#                                 installer can use unauthenticated release
#                                 downloads; private releases would require a
#                                 separate authenticated asset-fetch path.
#   quay.runtime_managers      — pinned package-manager / runtime binaries the
#                                 installer must guarantee on PATH before quay
#                                 bootstraps a worktree (`/bin/sh -c install_cmd`
#                                 uses a minimal PATH and won't pick up shell
#                                 profile installs). Each `repos[].quay.package_manager`
#                                 must have a matching key here with `version`
#                                 and `linux_x64_sha256`; the installer fetches
#                                 the upstream zip, verifies the SHA, and
#                                 installs the binary to `/usr/local/bin/<name>`
#                                 (root:root 0755). The SHA pin is the security
#                                 boundary. Idempotent: a binary already at the
#                                 pinned version is a no-op; a wrong version is
#                                 replaced atomically.
#   Quay reference repos context — once quay.version points at an AST-136
#                                 release, setup-hermes.sh renders
#                                 `[context].reference_repos_root` to
#                                 `<HERMES_HOME>/code` so Quay workers and
#                                 reviewers can inspect the same read-only
#                                 code mirrors the gateway uses.
#   Hermes/Quay boundary      — Hermes owns install/run wiring, local bind,
#                                 proxy/auth handoff, and launch prerequisites.
#                                 Quay owns product/runtime behavior defaults
#                                 and longer-term config contracts. See
#                                 docs/brix-1470-quay-boundary.md before
#                                 adding new keys to this block or rendering
#                                 existing keys into quay/config.toml.
#   quay.adapters.linear       — gates `quay enqueue --linear-issue`. Token
#                                 lives in <target>/auth/quay.env, never here.
#                                 Transitional: the enabled flag is still
#                                 rendered for existing flows, but adapter
#                                 behavior belongs to Quay.
#   quay.adapters.slack        — gates quay's slack adapter (waiting_human
#                                 thread posts + reply ingestion + enqueue-time
#                                 brief enrichment). Adapter code is built
#                                 upstream; this flag is the on/off switch. It
#                                 must stay enabled for Linear enqueue flows
#                                 that include `quay-config.slack_thread`, or
#                                 Quay can parse the URL but cannot retain and
#                                 hydrate the task's `slack_thread_ref`.
#                                 quay.env's SLACK_TOKEN is staged by
#                                 stage-secrets.sh from the gateway's
#                                 SLACK_BOT_TOKEN — same xoxb-, same bot
#                                 identity.
#   quay Admin UI/API         — when the pinned binary passes
#                                 `quay serve --help`, setup-hermes.sh
#                                 renders `[admin]` in quay/config.toml with
#                                 `require_auth=true` and
#                                 `token_env=QUAY_ADMIN_TOKEN`, generates that
#                                 token into auth/quay.env, and starts
#                                 `quay serve` on 127.0.0.1:9731. Public
#                                 exposure belongs behind an explicit proxy,
#                                 not by widening the Quay listener.
#   quay.agent_interface       — optional non-secret Agent Gateway wiring
#                                 rendered into auth/gateway-runtime.env and
#                                 loaded by quay-serve.service. Set provider
#                                 to `hermes` to connect Quay's `/v1/agent/*`
#                                 routes to the local Hermes API Server.
#                                 QUAY_HERMES_API_KEY is the actual secret and
#                                 is staged in auth/quay.env by
#                                 stage-secrets.sh, using the same generated
#                                 value as API_SERVER_KEY.
#   quay.orchestrator          — Quay orchestrator sidecar for durable Quay
#                                 delivery outbox items and legacy handoffs.
#                                 This renders to
#                                 <target>/quay/orchestrator.json, not
#                                 quay/config.toml, because these are sidecar
#                                 runtime knobs rather than Quay substrate
#                                 settings.
#                                 `default_slack_channel` is the deployment
#                                 fallback channel for human questions when
#                                 the task has no original Slack thread.
#   slack_triggers             — list of (channel, entry-skill) bindings that
#                                 turn top-level Slack messages in a channel
#                                 into autonomous skill invocations. Schema-
#                                 validated at install time. Threaded replies
#                                 never re-trigger (the entry skill MUST post
#                                 replies threaded on the source message —
#                                 thread_ts is set → top-level filter rejects).
#                                 Rendered into config.yaml as slack.triggers,
#                                 bridged to the Slack adapter's extra.triggers
#                                 at gateway boot.
#                                 Each entry:
#                                   channel_id      Slack channel id (C…/G…)
#                                   channel_name    optional, comment-only
#                                   skill           bound entry skill (must
#                                                   resolve under HERMES_SKILLS_ROOT
#                                                   at validate time when set)
#                                   require_top_level
#                                                   default true; reject
#                                                   thread replies
#                                   accept_from_bots
#                                                   default false; flip true
#                                                   for webhook bots like
#                                                   New Relic
#                                   synthetic_author{name,slack_id}
#                                                   required iff accept_from_bots
#                                                   true (quay validate-ticket
#                                                   needs a non-empty authors[]
#                                                   for bot-triggered tickets)
#                                   rate_limit{max_per_hour,on_overflow}
#                                                   per-channel sliding window;
#                                                   defaults 30/hr, skip on
#                                                   overflow. Slack re-delivers
#                                                   anyway; never queue.
#                                                   `skip` is the only
#                                                   currently-accepted policy.
#                                   default_repo    fallback when the entry
#                                                   skill can't infer a repo;
#                                                   the skill's inferred repo
#                                                   takes precedence.

org:
  name: Inverter
  agent_identity_name: didier

gateway:
  # LLM provider key the gateway pins to in <target>/config.yaml's model
  # block. Merged from this file on every install — a failed
  # `hermes auth add` config-update step no longer leaves the pin drifted.
  # The OAuth/API-key flow is still out-of-band (`hermes auth add
  # openai-codex` once for tokens), but the *config wiring* is values-
  # driven.
  model_provider: openai-codex
  # Default model used by scheduled/background jobs that do not carry their
  # own model pin. Without this, openai-codex cron turns reach the provider
  # with an empty model string.
  model_default: gpt-5.4
  # Empty = use the provider's default endpoint. Set only for routing
  # through a self-hosted gateway or an org-internal proxy.
  model_base_url: ""
  # See schema header (gateway.vision_provider / gateway.vision_model)
  # for why this is pinned. Empty values fall back to auto-detect.
  vision_provider: codex
  vision_model: gpt-5.4
  # Per-user authz is replaced by per-channel gating in this deployment:
  # bot membership in a Slack channel is operator-controlled, and the
  # slack.runtime.allowed_channels list below is the access boundary.
  # Setting this to true emits GATEWAY_ALLOW_ALL_USERS=true into
  # gateway-runtime.env so the user-level gate is bypassed. Flip to false
  # only when a separate slack.runtime.allowed_users list is also
  # maintained.
  allow_all_users: true
  # Optional: merge into <target>/config.yaml as approvals.mode on every
  # install. Set to "off" to bypass dangerous-command approval prompts for
  # trusted internal Slack deployments. The hardline blocklist still applies
  # even with approvals disabled.
  approvals_mode: off
  # Local Hermes API Server used by Quay's Agent Gateway. The bearer token is
  # generated/staged as API_SERVER_KEY in auth/hermes.env, not committed here.
  api_server:
    enabled: true
    host: 127.0.0.1
    port: 8642
    model_name: hermes-agent

auth:
  # GitHub App used for the agent's git push back to hermes-state. IDs are
  # public identifiers and live here; the PEM private key is the real
  # secret and stays out-of-band (operator passes --app-key-path on
  # install). On every run, setup-hermes.sh writes auth/github-app.env
  # from these values, so re-installs stop asking for --app-id /
  # --app-installation-id. Pass --app-id / --app-installation-id only to
  # override per-run (e.g. swap to a staging App).
  github_app:
    id: ""              # set to the numeric App ID once known
    installation_id: "" # set to the numeric installation ID once known
    # Empty = production github.com. Set only for GitHub Enterprise or
    # a CI mock endpoint.
    api_base: ""
  # Second GitHub App used by quay's reviewer worker — must be a distinct
  # identity from `github_app` above. GitHub refuses to let an App approve
  # PRs opened by the same App, so the worker and reviewer have to be two
  # separate identities (the operational pairing on krustentier is
  # didier-worker + didier-reviewer). First-install requires
  # --reviewer-app-key-path on the installer; the PEM persists at
  # /etc/hermes/reviewer.pem. quay-tick-runner reads
  # /etc/hermes/reviewer.env each tick, mints QUAY_REVIEWER_GH_TOKEN,
  # and passes it into `quay tick` so reviewer attempts post as the
  # reviewer App. Leave id/installation_id empty to skip reviewer wiring
  # entirely (the install still runs; reviewer worker just won't get a
  # distinct token).
  github_app_reviewer:
    id: "3693088"
    installation_id: "131824317"
    api_base: ""

linear:
  # Linear team UUIDs exposed to the gateway as LINEAR_TEAM_<KEY> env vars
  # (via auth/gateway-runtime.env). Used by skills/inverter-linear in
  # hermes-state to avoid hardcoding the team UUID. Add other teams here
  # by appending entries (e.g. `aster: <uuid>` → LINEAR_TEAM_ASTER).
  #
  # The `itry` team was renamed `iTRY` → `Brix` in Linear on 2026-05-11
  # (ticket prefix migrated `ITRY-` → `BRIX-`); same UUID. Both slugs are
  # exposed so existing repos[] entries keep working while new ones can
  # opt into the post-rename slug. Migrate everything to `brix` once the
  # downstream LINEAR_TEAM_ITRY consumers (gateway env, skills) are flipped.
  teams:
    itry: 28294e03-c1ce-4c2b-ba24-49e36179a321
    brix: 28294e03-c1ce-4c2b-ba24-49e36179a321

slack:
  app:
    display_name: BabyDidier(dev)
    description: 'Clack clack, I''m cooking ("je cuisine")'
    background_color: "#1b1b8c"
  runtime:
    # Slack member IDs (U…) authorized to talk to the bot. Comma-joined into
    # SLACK_ALLOWED_USERS on every install via auth/gateway-runtime.env, so
    # the operator stops re-typing this on re-runs/rotations. Empty list /
    # unset disables the gate (bot accepts every authorized user — risky in
    # public workspaces; keep populated for production). An explicit empty
    # list writes SLACK_ALLOWED_USERS= to clear stale legacy auth/slack.env
    # allowlists.
    allowed_users: []
    # If non-empty, the bot ONLY responds in these channels (whitelist).
    # Empty list / unset disables the gate. "*" anywhere disables it too.
    allowed_channels:
      # Existing Hermes-native channels retained from the previous allowlist.
      - C0B23MZ0USV
      - C0B4LLZ5Z2L
      - C0B4A6LEW31
      - C0B3WAWLL0L
      # OpenClaw Slack membership parity, observed 2026-05-23. This makes
      # Hermes allowed to respond in the same channels once the Slack app is
      # invited there; Slack membership itself remains workspace state.
      - C05M45H6KAT  # brix-business-development
      - C0B0LSP8H1B  # brix-product-feedback
      - C0B0MP16YDD  # brix-qna
      - C097HBE6Z7E  # daily-update
      - C0AJ4MM4PPT  # didier-kb
      - C0AEN8KDRT2  # didier-support
      - C0AAN0K8UMP  # itry-alerts-dev
      - C0AGZUH6C15  # itry-alerts-staging
      - C0AH910LEV9  # itry-alerts-prod
      - C09R47ZHB61  # itry-defi-n-gtm
      - C08956H1V4K  # itry-dev
      - C0AMT3TD86R  # itry-launch-testing
      - C09QSMWRJKH  # itry-marketing-n-comms
      - C09E9UX1JTH  # itry-ops
      - C094LCV1X36  # test-devops (private)
      - C0B5ZUS7WRG  # requested 2026-06-01
      - C0B79CZLM50  # requested 2026-06-01
    # Optional Slack channel ID the gateway treats as the agent's "home"
    # channel (for unsolicited posts). Leave blank to disable.
    home_channel: "C0B3WAWLL0L"
    # When true, the bot only responds in channels when @-mentioned (DMs are
    # unaffected). Mirrors slack.require_mention in upstream config.yaml.
    require_mention: true
    # Optional per-channel system prompt overrides:
    #   channel_prompts:
    #     C01ABC: "Code review mode"
    channel_prompts: {}

# Repos this deployment cares about. Every entry produces a code mirror;
# entries with a `quay:` block are additionally registered with quay.
# `issue_tracker:` (optional) wires the gateway's org-defaults prompt seed
# (rendered by `values_helper.py render-gateway-org-defaults`) so the
# agent reflexively reaches for Linear instead of `gh issue`. The
# `team:` value must match a key in `linear.teams` above — typos fail
# at install-time via `validate-schema`.
repos:
  - id: brix-landing
    url: https://github.com/InverterNetwork/brix-landing
    base_branch: main
    issue_tracker:
      linear:
        team: brix
    quay:
      package_manager: pnpm
      install_cmd: "pnpm install --frozen-lockfile"
  - id: iTRY-frontends
    url: https://github.com/InverterNetwork/iTRY-frontends
    # GH default branch is `master` (not `main`).
    base_branch: master
    issue_tracker:
      linear:
        team: itry
    quay:
      package_manager: bun
      install_cmd: "bun install"
  - id: iTRY-monorepo
    url: https://github.com/InverterNetwork/iTRY-monorepo
    base_branch: dev
    issue_tracker:
      linear:
        team: itry
    quay:
      package_manager: bun
      install_cmd: "bun install"
  - id: brix-indexer
    url: https://github.com/InverterNetwork/brix-indexer
    # GH default branch is `dev` (not `main`). The code-sync timer
    # hard-resets the mirror to origin/<base_branch> on every tick, so
    # mis-pinning this would silently revert the working tree.
    base_branch: dev
    issue_tracker:
      linear:
        team: brix
    quay:
      package_manager: pnpm
      # `--frozen-lockfile` refuses to mutate pnpm-lock.yaml — matches the
      # CI-canonical pnpm invocation, so worker installs fail loud on
      # lockfile drift instead of papering over it.
      install_cmd: "pnpm install --frozen-lockfile"
      # Per-repo tag vocab intentionally omitted. Add per-repo vocab here
      # once real ticket flow informs the namespace shape; absence is the
      # explicit "no vocab yet" signal.
  - id: erpc
    url: https://github.com/InverterNetwork/erpc
    base_branch: main
    issue_tracker:
      linear:
        team: itry
    quay:
      package_manager: pnpm
      install_cmd: "pnpm install --frozen-lockfile"
  - id: iTry-contracts
    url: https://github.com/InverterNetwork/iTry-contracts
    base_branch: main
    issue_tracker:
      linear:
        team: itry
    quay:
      package_manager: bun
      # Foundry-native repo; no package-manager bootstrap needed before
      # worker execution, so keep install as an explicit no-op.
      install_cmd: "true"
  - id: quay
    url: https://github.com/InverterNetwork/quay
    base_branch: dev
    issue_tracker:
      linear:
        team: brix
    quay:
