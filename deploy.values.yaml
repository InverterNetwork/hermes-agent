    base_branch: dev
    issue_tracker:
      linear:
        team: brix
    quay:
      package_manager: bun
      install_cmd: "bun install"

quay:
  # Pinned quay release tag (e.g. "v0.1.0"). Leave empty to skip quay
  # provisioning entirely (data dir, config.toml, binary fetch); set once
  # a v* tag is published on the quay repo. The installer verifies the
  # downloaded binary against SHA256SUMS — this pin is the security boundary.
  version: "v0.3.34"
  # Public org-owned release repo for unauthenticated installer downloads.
  release_repo: InverterNetwork/quay
  # Quay Agent panel backend. All values here are non-secret and are loaded by
  # quay-serve.service from auth/gateway-runtime.env; the shared bearer token
  # lives in auth/quay.env as QUAY_HERMES_API_KEY.
  agent_interface:
    enabled: true
    provider: hermes
    hermes_api_base_url: http://127.0.0.1:8642
    hermes_model: hermes-agent
    hermes_session_key_prefix: quay-krustentier
  # Dedicated Quay Admin Slack-ID allowlist. This is intentionally separate
  # from the general gateway user/channel allowlists and from
  # GATEWAY_ALLOW_ALL_USERS. Empty/unset denies every admin access request
  # at POST /quay/admin/authorize; "*" is not supported.
  # public_base_url is the public Hermes dashboard origin used in Slack
  # one-time login links for /quay-admin.
  admin:
    allowed_users:
      - U06TDC56VJB
      - U04DUF16KEG
      - U05N07C8KFC
      - U04CZLJ99ST
      - U0AEGC4KLJD
      - U087HHUQ3AQ
    public_base_url: https://didier.brix.fyi
  # Pinned Codex CLI worker binary. The OpenAI Codex GitHub release uses
  # `rust-v<version>` tags for static assets; the installer downloads the
  # linux-x64 musl tarball, verifies the release API SHA256 digest pinned
  # here, installs it next to /usr/local/bin/codex as a root-owned managed
  # binary, and exposes /usr/local/bin/codex as a root-owned symlink.
  # `codex login` remains an interactive operator step.
  codex:
    version: "rust-v0.130.0"
    linux_x64_sha256: "16779e7b7857508a768a36d7d4e084eec336ec23946ed70a9b09489b8f861190"
  # Pinned runtime managers the installer must guarantee on PATH before
  # quay bootstraps a worktree. Keys must match every distinct
  # `repos[].quay.package_manager` value in this file. linux_x64_sha256
  # is the upstream zip's SHA256 (oven-sh publishes SHASUMS256.txt
  # alongside the release); the installer refuses to proceed on mismatch.
  runtime_managers:
    bun:
      version: "1.3.9"
      linux_x64_sha256: "4680e80e44e32aa718560ceae85d22ecfbf2efb8f3641782e35e4b7efd65a1aa"
    # pnpm ships its linux-x64 release as a plain ELF binary (not a zip);
    # the installer's plain-binary recipe path handles this. SHA pin is
    # the security boundary; resolve from the canonical asset before
    # bumping the version:
    #   curl -fsSL https://github.com/pnpm/pnpm/releases/download/v<ver>/pnpm-linux-x64 | sha256sum
    pnpm:
      version: "10.33.4"
      linux_x64_sha256: "ff1795595535a10d0dfe327303f3dd02377be141190b1f5756de68edde2cf813"
  adapters:
    linear:
      enabled: true
      api_key_env: LINEAR_API_KEY
    slack:
      enabled: true
      bot_token_env: SLACK_TOKEN
      max_thread_messages: 200
  # Quay orchestrator sidecar. Drains durable Quay delivery outbox items and
  # legacy handoffs into the deployment feedback channel when work has no
  # original Slack thread.
  orchestrator:
    enabled: true
    default_slack_channel: "C0B4A6LEW31"
    slack_token_env: SLACK_BOT_TOKEN
    quay_command: /usr/local/bin/quay
    reply_timeout_seconds: 1800
    poll_interval_seconds: 15
atlas:
  # Pinned Atlas CLI release tag. The installer downloads atlas-linux-<arch>
  # from the release below, verifies it against SHA256SUMS, and installs it
  # as /usr/local/bin/atlas. Keep this empty until a published Atlas release
  # exists, or to skip Atlas provisioning.
  version: "v0.1.4"
  release_repo: InverterNetwork/atlas
  kb_repo: https://github.com/InverterNetwork/atlas-kb
  kb_branch: main
  # Empty means "$HERMES_HOME/atlas-kb". Keep non-secret paths/config here;
  # App PEMs and Codex OAuth state are staged on the host.
  kb_root: ""
  ai:
    mode: codex-exec
    codex_binary: /usr/local/bin/codex
    codex_timeout_ms: 120000
  github_app:
    id: "3925386"
    installation_id: "137066070"
  source_sync:
    enabled: true
    source_name: emusd-docs
    github_app:
      # GitHub App slug is intentionally `atlast-source-reader`.
      id: "3944782"
      installation_id: "137564290"
  sources:
    emusd-docs:
      type: github
      repo: InverterNetwork/emusd-docs
      branch: main
      include:
        - "**/*.md"
      exclude:
        - ".git/**"
        - ".github/**"
        - "**/.*/**"
        - "node_modules/**"
        - "dist/**"
        - "build/**"

# Channel-trigger router. Each entry binds a Slack channel to an entry
# skill — top-level messages in that channel autonomously invoke the
# skill. Threaded replies never re-trigger (require_top_level: true).
# Populate `channel_id` from the actual Slack channel id (visible in
# the URL: https://app.slack.com/client/<team>/<channel_id>); the
# `feedback-intake` skill is shipped in hermes-state.
slack_triggers:
  - channel_id: C0B4LLZ5Z2L
    channel_name: brix-feedback-sandbox
    skill: feedback-intake
    require_top_level: true
    accept_from_bots: false
    rate_limit:
      max_per_hour: 30
      on_overflow: skip
    default_repo: iTRY-monorepo
  # iTRY alert/report channels — port of OpenClaw's alert-channel behavior.
  # Bot-authored alert and daily-report messages trigger the
  # itry-alert-triage entry skill, which investigates and replies in-thread.
  # accept_from_bots: true is required because the monitoring/report poster
  # is a bot; synthetic_author stamps a non-empty author on bot-triggered
  # invocations (quay validate-ticket needs authors[]). The dev alert
  # channel (C0AAN0K8UMP) is deliberately NOT bound — it stays silent in
  # Hermes just as OpenClaw was configured not to respond there. Add an
  # entry here only if dev should become responsive.
  - channel_id: C0AGZUH6C15
    channel_name: itry-alerts-staging
    skill: itry-alert-triage
    require_top_level: true
    accept_from_bots: true
    synthetic_author:
      name: iTRY Alerts
      slack_id: BITRYALERT
    rate_limit:
      max_per_hour: 30
      on_overflow: skip
    default_repo: iTRY-monorepo
  - channel_id: C0AH910LEV9
    channel_name: itry-alerts-prod
    skill: itry-alert-triage
    require_top_level: true
    accept_from_bots: true
    synthetic_author:
      name: iTRY Alerts
      slack_id: BITRYALERT
    rate_limit:
      max_per_hour: 30
      on_overflow: skip
    default_repo: iTRY-monorepo
